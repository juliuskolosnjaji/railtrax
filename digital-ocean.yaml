name: railtrax
services:
- name: web
  source_dir: /
  github:
    repo: juliuskolosnjaji/railtrax
    branch: main
  run_command: npm start
  build_command: npm run build
  environment_slug: node-js
  instance_count: 1
  instance_size_slug: basic-xxs
  domains:
  - railtrax.yourdomain.com
  health_check:
    http_path: /api/health