services:
  - type: web
    name: railtrax-web
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Database
      - key: DATABASE_URL
        sync: false  # Will be set in Render dashboard
      
      # Supabase
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      
      # Redis
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      
      # Billing (Lemon Squeezy)
      - key: LEMON_SQUEEZY_API_KEY
        sync: false
      - key: LEMON_SQUEEZY_WEBHOOK_SECRET
        sync: false
      - key: LEMON_SQUEEZY_STORE_ID
        sync: false
      - key: LS_VARIANT_PLUS_MONTHLY
        sync: false
      - key: LS_VARIANT_PLUS_YEARLY
        sync: false
      - key: LS_VARIANT_PRO_MONTHLY
        sync: false
      - key: LS_VARIANT_PRO_YEARLY
        sync: false
      
      # Email (Resend)
      - key: RESEND_API_KEY
        sync: false
      
      # OAuth (Google)
      - key: NEXT_PUBLIC_GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      
      # Anthropic (AI features)
      - key: ANTHROPIC_API_KEY
        sync: false
      
      # API Keys for train data
      - key: SWISS_OTD_API_KEY
        sync: false
      - key: NS_API_KEY
        sync: false
      - key: NAVITIA_API_KEY
        sync: false
      
      # Static map export
      - key: GEOAPIFY_API_KEY
        sync: false

      # App URL
      - key: NEXT_PUBLIC_URL
        fromService:
          type: web
          name: railtrax-web
          envVarKey: RENDER_EXTERNAL_URL
      
      # Node.js version
      - key: NODE_VERSION
        value: "20.19.0"
      
      # Environment
      - key: NODE_ENV
        value: production